# Build Next.js static export and deploy to GitHub Pages.
# REQUIRED once per repo: Settings → Pages → Build and deployment → Source: "GitHub Actions"
# (Otherwise "Configure Pages" fails with HttpError: Not Found — no Pages site exists yet.)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install and build
        working-directory: dashboard
        env:
          # next.config.ts uses this + GITHUB_REPOSITORY to set basePath for static assets
          GITHUB_PAGES: "1"
        run: |
          npm ci
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/out

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
